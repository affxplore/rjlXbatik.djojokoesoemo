<div class="container">
    <h2>Daftar Kelas Terdaftar</h2>

    <!-- Bagian Filter (Mirip contoh gambar kamu) -->
    <div class="filter-section">
        <select id="classFilter" onchange="loadData()">
            <option value="all">-- Pilih Jenis Kelas --</option>
            <option value="Batik">Batik Workshop</option>
            <option value="Textile">Textile Design</option>
            <option value="Natural Dye">Natural Dyeing</option>
        </select>
        <input type="text" id="searchInput" placeholder="Cari nama..." onkeyup="loadData()">
    </div>

    <!-- Container untuk List/Card -->
    <div id="classList" class="class-grid">
        <!-- Data akan muncul di sini via JavaScript -->
    </div>
</div>

<script>
function loadData() {
    const type = document.getElementById('classFilter').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    const listContainer = document.getElementById('classList');

    fetch(`/api/get-classes?type=${type}`)
        .then(response => response.json())
        .then(data => {
            listContainer.innerHTML = ''; // Kosongkan list lama
            
            // Filter tambahan untuk search bar (client-side)
            const filteredData = data.filter(item => 
                item.name.toLowerCase().includes(search)
            );

            if(filteredData.length === 0) {
                listContainer.innerHTML = '<p>Data tidak ditemukan.</p>';
                return;
            }

            filteredData.forEach(item => {
                const card = `
                    <div class="class-card">
                        <h3>${item.name}</h3>
                        <p><strong>Tipe:</strong> ${item.type}</p>
                        <p><strong>Tanggal:</strong> ${item.date}</p>
                    </div>
                `;
                listContainer.innerHTML += card;
            });
        });
}

// Load data pertama kali saat halaman dibuka
window.onload = loadData;
</script>

<style>
    .filter-section { margin-bottom: 20px; display: flex; gap: 10px; }
    select, input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
    
    .class-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
        gap: 20px; 
    }
    .class-card { 
        background: #fff; 
        padding: 15px; 
        border-radius: 10px; 
        box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        border-left: 5px solid #d4a373;
    }
</style>
